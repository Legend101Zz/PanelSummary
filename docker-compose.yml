services:
  mongo:
    image: mongo:7.0
    container_name: panelsummary_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: panelsummary

  redis:
    image: redis:7.2-alpine
    container_name: panelsummary_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: panelsummary_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - storage_data:/storage
      - pdf_uploads:/tmp/uploads
    environment:
      MONGODB_URL: mongodb://mongo:27017
      DB_NAME: panelsummary
      REDIS_URL: redis://redis:6379
      CORS_ORIGINS: http://localhost:3000
      STORAGE_DIR: /storage
      UPLOAD_DIR: /tmp/uploads
      SECRET_KEY: dev-secret-change-in-production
    depends_on:
      - mongo
      - redis

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: panelsummary_worker
    restart: unless-stopped
    command: celery -A app.celery_worker worker --loglevel=info --pool=solo
    volumes:
      - ./backend:/app
      - storage_data:/storage
      - pdf_uploads:/tmp/uploads
    environment:
      MONGODB_URL: mongodb://mongo:27017
      DB_NAME: panelsummary
      REDIS_URL: redis://redis:6379
      STORAGE_DIR: /storage
      UPLOAD_DIR: /tmp/uploads
      SECRET_KEY: dev-secret-change-in-production
    depends_on:
      - mongo
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: panelsummary_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_TELEMETRY_DISABLED: "1"
    depends_on:
      - backend

volumes:
  mongo_data:
  storage_data:
  pdf_uploads:
